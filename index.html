<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Send URL to n8n Workflow</title>
<style>
body { font-family: Arial, sans-serif; max-width: 900px; margin: 50px auto; padding: 20px; background-color: #f4f4f4; }
.container { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
h1 { text-align: center; color: #333; }
form { display: flex; flex-direction: column; }
label { margin-bottom: 8px; font-weight: bold; }
input[type="url"] { padding: 10px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 4px; font-size: 16px; }
button { padding: 12px; background-color: #007bff; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; }
button:hover { background-color: #0056b3; }
#message { margin-top: 20px; padding: 10px; border-radius: 4px; display: none; }
.success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
.error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
#reviews { margin-top: 20px; }
.overall-sentiment { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px; border-radius: 8px; margin: 20px 0; text-align: center; }
.overall-sentiment h2 { margin: 0 0 15px 0; }
.sentiment-metrics { display: flex; justify-content: space-around; gap: 15px; }
.sentiment-metric { background: rgba(255,255,255,0.2); padding: 15px; border-radius: 6px; flex: 1; }
.sentiment-metric strong { display: block; font-size: 24px; margin-top: 5px; }
.charts-container { display: flex; gap: 20px; margin-top: 20px; }
.chart-wrapper { flex: 1; }
canvas { max-width: 100%; }
</style>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="container">
<h1>Send URL to n8n Workflow</h1>

<form id="urlForm">
    <label for="urlInput">Enter URL:</label>
    <input type="url" id="urlInput" placeholder="https://example.com" required>
    <button type="submit">Analyze Sentiment</button>
</form>

<div id="message"></div>
<div id="overall-sentiment-container"></div>
<div class="charts-container">
    <div class="chart-wrapper">
        <canvas id="sentimentChart" style="display:none;"></canvas>
    </div>
    <div class="chart-wrapper">
        <canvas id="averageChart" style="display:none;"></canvas>
    </div>
</div>
<div id="reviews"></div>
</div>

<script>
const webhookUrl = 'http://localhost:5678/webhook-test/752b8d6f-ad65-4bd4-a2ee-66a49ac43926';

// Variable to hold the current chart instance
let currentChart = null;
let averageChartInstance = null;

// Function to clear all frontend content
function clearAllContent() {
    document.getElementById('message').innerHTML = '';
    document.getElementById('message').style.display = 'none';
    document.getElementById('overall-sentiment-container').innerHTML = '';
    document.getElementById('reviews').innerHTML = '';
    
    // Destroy charts
    if (currentChart) {
        currentChart.destroy();
        currentChart = null;
    }
    if (averageChartInstance) {
        averageChartInstance.destroy();
        averageChartInstance = null;
    }
    
    // Hide chart canvases
    const sentimentChart = document.getElementById('sentimentChart');
    const averageChart = document.getElementById('averageChart');
    if (sentimentChart) sentimentChart.style.display = 'none';
    if (averageChart) averageChart.style.display = 'none';
}

// Clear content on page load
window.addEventListener('load', () => {
    clearAllContent();
});

document.getElementById('urlForm').addEventListener('submit', async (event) => {
    event.preventDefault();

    // Clear previous data on server and frontend
    await fetch('/clear-reviews', { method: 'POST' });
    
    // Clear all content
    clearAllContent();

    const urlInput = document.getElementById('urlInput').value.trim();
    const messageDiv = document.getElementById('message');

    messageDiv.style.display = 'none';
    messageDiv.className = '';

    if (!urlInput) {
        messageDiv.textContent = "Please enter a URL!";
        messageDiv.className = 'error';
        messageDiv.style.display = 'block';
        return;
    }

    try {
        const url = new URL(urlInput);
        const hostname = url.hostname.toLowerCase();
        let extractedInfo = {};

        /* ---------- AMAZON ---------- */
        if (hostname.includes('amazon.')) {
            const params = new URLSearchParams(url.search);
            const pathParts = url.pathname.split('/').filter(Boolean);
            const productSlug = pathParts[0] || '';
            const country = hostname.split('.').pop().toUpperCase();

            extractedInfo = {
                type: 'Amazon',
                product: productSlug || decodeURIComponent(params.get("keywords") || 'Unknown Product'),
                country
            };
        }

        /* ---------- GOOGLE MAPS ---------- */
        else if (hostname.includes('google.com') && url.pathname.includes('/maps/place/')) {
            const pathParts = url.pathname.split('/').filter(Boolean);
            const placeIndex = pathParts.indexOf('place');
            const place = placeIndex >= 0 ? decodeURIComponent(pathParts[placeIndex + 1].replace(/\+/g, ' ')) : 'N/A';

            extractedInfo = {
                type: 'Google Maps',
                place
            };
        }

        /* ---------- SEND TO n8n ---------- */
        const response = await fetch(webhookUrl, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ url: urlInput, extractedInfo })
        });

        if (!response.ok) throw new Error('n8n workflow failed');

        let data;
        try {
            const text = await response.text();
            console.log('Response text:', text);
            data = JSON.parse(text.trim());
        } catch (e) {
            console.error('JSON parse error, using mock data');
            // Mock data for demonstration
            
        }

        /* ---------- DISPLAY RESULT ---------- */
        let html = `<strong>Extracted Info</strong><br>`;

        if (extractedInfo.type === 'Amazon') {
            html += `🛒 Product: ${extractedInfo.product}<br><br>`;
        } else if (extractedInfo.type === 'Google Maps') {
            html += `📍 Place: ${extractedInfo.place}<br><br>`;
        }

        if (data.positivelstm !== undefined) {
            // Calculate averages
            const avgPositive = Math.round((data.positivelstm + data.positiveberd + data.positivevader) / 3);
            const avgNegative = Math.round((data.negativelstm + data.negativeberd + data.negativevader) / 3);
            const avgNeutral = Math.round((data.neutrallstm + data.neutralberd + data.neutralvader) / 3);

            // Determine dominant sentiment
            let dominantSentiment = 'Neutral';
            let dominantColor = '#6c757d';
            if (avgPositive > avgNegative && avgPositive > avgNeutral) {
                dominantSentiment = 'Positive';
                dominantColor = '#28a745';
            } else if (avgNegative > avgPositive && avgNegative > avgNeutral) {
                dominantSentiment = 'Negative';
                dominantColor = '#dc3545';
            }

            // Display overall sentiment
            const overallDiv = document.getElementById('overall-sentiment-container');
            overallDiv.innerHTML = `
                <div class="overall-sentiment">
                    <h2>Overall Sentiment (Average)</h2>
                    <div class="sentiment-metrics">
                        <div class="sentiment-metric">
                            <span>✅ Positive</span>
                            <strong>${avgPositive}%</strong>
                        </div>
                        <div class="sentiment-metric">
                            <span>❌ Negative</span>
                            <strong>${avgNegative}%</strong>
                        </div>
                        <div class="sentiment-metric">
                            <span>⚪ Neutral</span>
                            <strong>${avgNeutral}%</strong>
                        </div>
                    </div>
                </div>
            `;

            html += `
<strong>Sentiment Analysis Results</strong><br><br>

<strong>LSTM</strong><br>
✅ Positive: ${data.positivelstm}%<br>
❌ Negative: ${data.negativelstm}%<br>
⚪ Neutral: ${data.neutrallstm}%<br><br>

<strong>BERD</strong><br>
✅ Positive: ${data.positiveberd}%<br>
❌ Negative: ${data.negativeberd}%<br>
⚪ Neutral: ${data.neutralberd}%<br><br>

<strong>VADER</strong><br>
✅ Positive: ${data.positivevader}%<br>
❌ Negative: ${data.negativevader}%<br>
⚪ Neutral: ${data.neutralvader}%<br>

  
`;
        }

        messageDiv.innerHTML = html;
        messageDiv.className = 'success';
        messageDiv.style.display = 'block';
        const chartCanvas = document.getElementById('sentimentChart');
        const averageCanvas = document.getElementById('averageChart');

        // Calculate averages for charts
        const avgPositive = Math.round((data.positivelstm + data.positiveberd + data.positivevader) / 3);
        const avgNegative = Math.round((data.negativelstm + data.negativeberd + data.negativevader) / 3);
        const avgNeutral = Math.round((data.neutrallstm + data.neutralberd + data.neutralvader) / 3);

        // Prepare chart data
        const labels = ['LSTM', 'BERD', 'VADER'];

        const positiveData = [
            data.positivelstm,
            data.positiveberd,
            data.positivevader
        ];

        const negativeData = [
            data.negativelstm,
            data.negativeberd,
            data.negativevader
        ];

        const neutralData = [
            data.neutrallstm,
            data.neutralberd,
            data.neutralvader
        ];

        // Create grouped bar chart for all models
        if (currentChart) {
            currentChart.destroy();
        }
        currentChart = new Chart(chartCanvas.getContext('2d'), {
            type: 'bar',
            data: {
                labels,
                datasets: [
                    {
                        label: 'Positive',
                        data: positiveData,
                        backgroundColor: '#28a745'
                    },
                    {
                        label: 'Negative',
                        data: negativeData,
                        backgroundColor: '#dc3545'
                    },
                    {
                        label: 'Neutral',
                        data: neutralData,
                        backgroundColor: '#6c757d'
                    }
                ]
            },
            options: {
                responsive: true,
                scales: {
                    y: {
                        beginAtZero: true,
                        max: 100,
                        title: {
                            display: true,
                            text: 'Percentage (%)'
                        }
                    }
                },
                plugins: {
                    legend: {
                        position: 'top'
                    },
                    title: {
                        display: true,
                        text: 'Sentiment Comparison Across Models'
                    }
                }
            }
        });

        chartCanvas.style.display = 'block';

        // Create pie chart for average sentiment
        averageChartInstance = new Chart(averageCanvas.getContext('2d'), {
            type: 'doughnut',
            data: {
                labels: ['Positive', 'Negative', 'Neutral'],
                datasets: [{
                    data: [avgPositive, avgNegative, avgNeutral],
                    backgroundColor: ['#28a745', '#dc3545', '#6c757d'],
                    borderColor: ['#fff', '#fff', '#fff'],
                    borderWidth: 2
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: {
                        position: 'bottom'
                    },
                    title: {
                        display: true,
                        text: 'Overall Sentiment Average'
                    },
                    tooltip: {
                        callbacks: {
                            label: function(context) {
                                return context.label + ': ' + context.parsed + '%';
                            }
                        }
                    }
                }
            }
        });

        averageCanvas.style.display = 'block';

        // Reload reviews after analysis
        loadReviews();


    } catch (err) {
        messageDiv.textContent = 'Error: ' + err.message;
        messageDiv.className = 'error';
        messageDiv.style.display = 'block';
    }
});

async function loadReviews() {
    try {
        const response = await fetch('/reviews');
        const data = await response.json();
        const reviewsDiv = document.getElementById('reviews');

        // Debug: See what the browser actually received
        console.log("Data received by browser:", data);

        if (data.reviews && data.reviews.length > 0) {
            let html = '<h3>Recent Reviews</h3>';
            data.reviews.forEach((review, index) => {
                html += `
                    <div class="review" style="border: 1px solid #ddd; padding: 10px; margin-bottom: 10px; border-radius: 4px; background: #f9f9f9;">
                        <strong>Review ${index + 1}:</strong><br>
                        ${review}
                    </div>`;
            });
            reviewsDiv.innerHTML = html;
        } 
    } catch (err) {
        console.error('Error loading reviews:', err);
    }
}

// 1. Load immediately
loadReviews();
</script>

</body>
</html>
